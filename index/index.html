<html>
    <head>
        <meta charset = "UTF-8">
        <title>Forest</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <script src="script.js"></script>
        <h1>Plantiii The Forest</h1>
        <p> Welcome to plantii home app ! </p>
        <p>
        Time - <span id = "current_time"></span><br>
        Temperature - <span id = "current_temp"></span><br>
        </p>

        <h2>Dashboard</h2>

        <div id="main-dashboard" class="dashboard-grid">
            <button class="device-tile">
                <h3>Sprouty</h3>
            </button>
            <button class="device-tile">
                <h3>AC Unit</h3>
            </button>
            <button class="device-tile">
                <h3>Smart Lock</h3>
            </button>
        </div>

    <div id="detail-view" style="display: none; padding: 40px;">
    <button id="back-btn" class="tile-btn">← Back to Forest</button>
    <h1 id="device-title" style="margin-top: 20px;">Device Name</h1>
    <div class="status-box">
        <p>Current Status: <strong>90% Intact</strong></p>
        <p>Last Sync: May 2, 2026</p>
    </div>
</div>

    </body>
</html>
